<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>only u</title>
        <link rel="stylesheet" href="css/index.css" />
    </head>
    <body>
		<img src="img/beijin.jpg" class="background-image"/>
		<div class="audio-container">
		  <audio controls loop>
			<source src="music/Only U - 10cm - MyFreeMP3.mp3" type='audio/ogg'>
		    <source src="music/Only U - 10cm - MyFreeMP3.mp3" type="audio/mpeg">  
		  </audio>  
		  <span class="audio-title">Only U - 10cm</span>  
		</div>
        <!--/*外层最大容器*/-->
        <div class="wrap">
		<!--/*包裹所有元素的容器*/-->
        <div class="cube">
            <!--前面图片 -->
            <div class="out_front">
                <video width="200" height="200" controls>
					<source src="img/2.mp4" type="video/mp4">
				</video>
            </div>
            <!--后面图片 -->
            <div class="out_back">
                	<video width="200" height="200" controls>
                		<source src="img/1.mp4" type="video/mp4">
                	</video>
            </div>
            <!--左图片 -->
            <div class="out_left">
                <img src="img/3.jpg"  class="pic"/>
            </div>
            <div class="out_right">
                <img src="img/4.jpg"  class="pic"/>
            </div>
            <div class="out_top">
                <img src="img/5.jpg"  class="pic"/>
            </div>
            <div class="out_bottom">
                <img src="img/6.jpg"  class="pic"/>
            </div>
            <!--小正方体 --> 
            <span class="in_front">
                <img src="img/1.jpg" class="in_pic" />
            </span>
            <span class="in_back">
                 <img src="img/8.jpg" class="in_pic" />
            </span>
            <span class="in_left">
                <img src="img/9.jpg" class="in_pic" />
            </span>
            <span class="in_right">
                <img src="img/9.jpg" class="in_pic" />
            </span>
            <span class="in_top">
                <img src="img/11.jpg" class="in_pic" />
            </span>
            <span class="in_bottom">
                <img src="img/12.jpg" class="in_pic" />
            </span>
        </div>
        </div>
		
		

    </body>
</html>
